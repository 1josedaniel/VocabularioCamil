<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Master Irregular Verbs & Vocabulary</title>
    <!-- Carga de Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class'
        }
    </script>
    <!-- Carga de iconos FontAwesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Carga de fuente moderna y amigable -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Script de inicialización de tema para forzar Claro como predeterminado -->
    <script>
        (function() {
            const storedTheme = localStorage.getItem('theme');
            // Únicamente activamos el modo oscuro si el usuario lo guardó de forma explícita
            if (storedTheme === 'dark') {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
        })();
    </script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f8fafc;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,0.03) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,0.03) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,0.03) 0, transparent 50%);
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Variables y sobreescrituras para Modo Oscuro */
        .dark body {
            background-color: #0b1329;
            background-image: radial-gradient(at 0% 0%, hsla(253,16%,7%,0.4) 0, transparent 50%), 
                              radial-gradient(at 50% 0%, hsla(225,39%,30%,0.3) 0, transparent 50%), 
                              radial-gradient(at 100% 0%, hsla(339,49%,30%,0.3) 0, transparent 50%);
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        .dark ::-webkit-scrollbar-thumb:hover { background: #64748b; }

        .verb-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .verb-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.15), 0 8px 10px -6px rgba(14, 165, 233, 0.1);
            border-color: #bae6fd; 
        }

        .dark .verb-card:hover {
            box-shadow: 0 10px 25px -5px rgba(14, 165, 233, 0.3), 0 8px 10px -6px rgba(14, 165, 233, 0.2);
            border-color: #1e293b;
        }

        .practice-input { transition: all 0.2s ease; }
        .practice-input:focus { transform: scale(1.02); }
        
        .input-success {
            background-color: #ecfdf5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
        }
        .dark .input-success {
            background-color: #064e3b !important;
            border-color: #059669 !important;
            color: #ecfdf5 !important;
            box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.2);
        }

        .input-error {
            background-color: #fef2f2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.1);
        }
        .dark .input-error {
            background-color: #7f1d1d !important;
            border-color: #dc2626 !important;
            color: #fef2f2 !important;
            box-shadow: 0 0 0 4px rgba(239, 68, 68, 0.2);
        }

        .tab-switch { position: relative; background-color: #e2e8f0; border-radius: 9999px; padding: 4px; display: inline-flex; max-width: 100%; transition: background-color 0.3s; }
        .dark .tab-switch { background-color: #1e293b; }

        .tab-btn { position: relative; z-index: 10; padding: 10px 16px; border-radius: 9999px; font-weight: 600; font-size: 0.9rem; transition: all 0.3s ease; color: #64748b; white-space: nowrap; }
        .dark .tab-btn { color: #94a3b8; }
        @media (min-width: 640px) { .tab-btn { padding: 10px 24px; font-size: 0.95rem; } }
        
        .tab-btn.active { color: #2563eb; background-color: white; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        .dark .tab-btn.active { color: #60a5fa; background-color: #0b1329; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.4), 0 2px 4px -1px rgba(0, 0, 0, 0.3); }
    </style>
</head>
<body class="text-slate-800 dark:text-slate-200 min-h-screen pb-12">

<!-- Botón del Tema en la parte superior derecha -->
<div class="fixed top-4 right-4 z-50">
    <button id="themeToggleBtn" onclick="toggleTheme()" class="h-10 w-10 sm:h-12 sm:w-12 rounded-2xl bg-white dark:bg-slate-900 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-800 shadow-md flex items-center justify-center hover:scale-105 active:scale-95 transition-all focus:outline-none" title="Cambiar tema">
        <i id="themeIcon" class="fas fa-sun text-lg sm:text-xl"></i>
    </button>
</div>

<div class="container mx-auto px-4 pt-10 max-w-5xl">
    <header class="text-center mb-10">
        <div class="inline-block bg-cyan-100 dark:bg-cyan-950/50 text-cyan-700 dark:text-cyan-400 px-4 py-1.5 rounded-full text-xs sm:text-sm font-bold tracking-wide mb-3 uppercase">Aprende Inglés</div>
        <h1 class="text-3xl sm:text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-cyan-600 dark:from-blue-400 dark:to-cyan-400 mb-4 pb-1">Vocabulario & Verbos</h1>
        <p class="text-slate-500 dark:text-slate-400 text-base sm:text-lg max-w-2xl mx-auto px-2">Domina verbos irregulares y sustantivos cotidianos con audio y voz.</p>
    </header>

    <div class="flex justify-center mb-10 overflow-x-auto px-2">
        <div class="tab-switch">
            <button id="tab-study" class="tab-btn active focus:outline-none" onclick="switchTab('study')">
                <i class="fas fa-book-open mr-2"></i>Aprender
            </button>
            <button id="tab-practice" class="tab-btn focus:outline-none" onclick="switchTab('practice')">
                <i class="fas fa-gamepad mr-2"></i>Practicar
            </button>
        </div>
    </div>

    <div id="section-study" class="space-y-6">
        
        <!-- Barra de Paginación Inteligente con Desplegables de Categoría y Grupo -->
        <div class="flex flex-col xl:flex-row gap-4 justify-between items-start xl:items-center bg-white dark:bg-slate-900 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
            <div class="flex flex-col sm:flex-row items-start sm:items-center gap-4 w-full xl:w-auto">
                <!-- Selector de Página -->
                <div class="flex items-center gap-2.5 w-full sm:w-auto">
                    <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider shrink-0">
                        <i class="fas fa-file-alt mr-1 text-cyan-500"></i>Página:
                    </span>
                    <div class="relative w-full sm:w-64">
                        <select id="pageSelect" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-2 text-xs sm:text-sm font-bold text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-cyan-500 cursor-pointer appearance-none">
                            <!-- Las opciones se inyectarán dinámicamente -->
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400 dark:text-slate-500">
                            <i class="fas fa-chevron-down text-[10px]"></i>
                        </div>
                    </div>
                </div>

                <!-- Selector de subgrupos de 5 en 5 -->
                <div class="flex items-center gap-2.5 w-full sm:w-auto">
                    <span class="text-xs font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider shrink-0">
                        <i class="fas fa-layer-group mr-1 text-cyan-500"></i>Grupo:
                    </span>
                    <div class="relative w-full sm:w-44">
                        <select id="rangeSelect" class="w-full bg-slate-50 dark:bg-slate-950 border border-slate-200 dark:border-slate-800 rounded-xl px-4 py-2 text-xs sm:text-sm font-bold text-slate-700 dark:text-slate-200 focus:outline-none focus:ring-2 focus:ring-cyan-500 cursor-pointer appearance-none">
                            <option value="all">Todos</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-3 text-slate-400 dark:text-slate-500">
                            <i class="fas fa-chevron-down text-[10px]"></i>
                        </div>
                    </div>
                </div>
            </div>
            <div class="text-xs font-medium text-slate-400 dark:text-slate-500 shrink-0">
                Mostrando <span id="displayedCount" class="font-bold text-cyan-500">0</span> de <span id="totalCount" class="font-bold text-slate-600 dark:text-slate-300">0</span> elementos
            </div>
        </div>

        <!-- Barra de Búsqueda y Configuración -->
        <div class="flex flex-col lg:flex-row gap-4 items-center justify-between bg-white dark:bg-slate-900 p-4 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
            <div class="relative w-full lg:flex-1">
                <input type="text" id="searchInput" placeholder="Busca palabras..." class="w-full pl-12 pr-4 py-3 bg-slate-50 dark:bg-slate-950 border-none rounded-xl focus:outline-none focus:ring-2 focus:ring-cyan-500 text-slate-700 dark:text-slate-200 placeholder-slate-400 dark:placeholder-slate-500 font-medium transition-shadow">
                <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none"><i class="fas fa-search text-slate-400 dark:text-slate-500 text-lg"></i></div>
            </div>
            
            <div class="w-full sm:w-1/2 lg:w-64 flex items-center bg-slate-50 dark:bg-slate-950 px-4 py-2 rounded-xl border border-slate-100 dark:border-slate-800 shrink-0">
                 <i class="fas fa-robot text-slate-400 dark:text-slate-500 mr-3 text-sm"></i>
                 <div class="flex-1 overflow-hidden">
                     <label for="voiceSelect" class="block text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wide">Voz de Práctica</label>
                     <select id="voiceSelect" class="w-full bg-transparent border-none focus:outline-none text-xs sm:text-sm font-medium text-slate-700 dark:text-slate-200 cursor-pointer truncate dark:bg-slate-950">
                         <option value="">Cargando...</option>
                     </select>
                 </div>
            </div>

            <div class="w-full sm:w-1/2 lg:w-64 flex items-center bg-slate-50 dark:bg-slate-950 px-4 py-2 rounded-xl border border-slate-100 dark:border-slate-800 shrink-0">
                 <i class="fas fa-sliders-h text-slate-400 dark:text-slate-500 mr-3 text-sm"></i>
                 <div class="flex-1 overflow-hidden">
                     <label for="toleranceSelect" class="block text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wide">Sensibilidad de Pronunciación</label>
                     <select id="toleranceSelect" class="w-full bg-transparent border-none focus:outline-none text-xs sm:text-sm font-medium text-slate-700 dark:text-slate-200 cursor-pointer truncate dark:bg-slate-950">
                         <option value="easy" selected>Fácil (Más permisivo)</option>
                         <option value="normal">Normal (Equilibrado)</option>
                         <option value="strict">Estricto (Exacto)</option>
                     </select>
                 </div>
            </div>
        </div>

        <!-- Tabla / Lista de Verbos y Sustantivos -->
        <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col">
            <!-- Encabezados dinámicos se inyectarán según el tipo de página -->
            <div id="verbsTableHeader" class="hidden sm:flex px-6 py-4 bg-slate-50 dark:bg-slate-950 border-b border-slate-200 dark:border-slate-800 text-xs font-bold text-slate-500 dark:text-slate-400 uppercase tracking-wider">
                <!-- Se inyecta dinámicamente -->
            </div>
            <div id="verbsList" class="max-h-[60vh] overflow-y-auto p-3 space-y-2 bg-slate-50/50 dark:bg-slate-950/50"></div>
        </div>
    </div>

    <!-- Sección de Practicar -->
    <div id="section-practice" class="hidden">
        <div class="max-w-2xl mx-auto">
            <div class="flex justify-between items-center mb-6 px-2">
                <div class="flex flex-col text-left w-full">
                    <h2 class="text-xl sm:text-2xl font-bold text-slate-800 dark:text-slate-100"><i class="fas fa-pen-nib text-cyan-500 mr-2"></i> Ponte a Prueba</h2>
                    <span class="text-xs text-slate-400 dark:text-slate-500 font-medium">Practicando <b id="practicePageLabel" class="text-cyan-500">...</b></span>
                    <!-- Indicación dinámica del rango en práctica -->
                    <div class="flex items-center justify-between mt-1 w-full">
                        <span id="practiceRangeLabel" class="text-[10px] text-slate-400 dark:text-slate-500 font-bold uppercase tracking-wider">Grupo Activo: ...</span>
                        <span id="practiceCounterLabel" class="text-[10px] text-cyan-600 dark:text-cyan-400 font-bold tracking-wider bg-cyan-50 dark:bg-cyan-950/50 px-2 py-0.5 rounded-full">0/0</span>
                    </div>
                    <!-- Barra de progreso -->
                    <div class="w-full bg-slate-200 dark:bg-slate-800 rounded-full h-1.5 mt-2 overflow-hidden">
                        <div id="practiceProgressBar" class="bg-gradient-to-r from-blue-500 to-cyan-500 h-1.5 rounded-full transition-all duration-300 ease-out" style="width: 0%"></div>
                    </div>
                </div>
            </div>

            <!-- Selector de Modo de Práctica: Traducir o Dictado -->
            <div class="flex justify-center mb-6 px-2">
                <div class="tab-switch text-xs sm:text-sm">
                    <button id="practice-mode-translate" class="tab-btn active focus:outline-none" onclick="setPracticeMode('translate')">
                        <i class="fas fa-language mr-1.5"></i>Traducir
                    </button>
                    <button id="practice-mode-listen" class="tab-btn focus:outline-none" onclick="setPracticeMode('listen')">
                        <i class="fas fa-headphones mr-1.5"></i>Escuchar y Escribir
                    </button>
                </div>
            </div>

            <div class="bg-white dark:bg-slate-900 rounded-3xl shadow-xl border border-slate-100 dark:border-slate-800/80 p-6 sm:p-8 text-center relative overflow-hidden">
                <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-blue-500 to-cyan-500"></div>
                <p id="practiceInstruction" class="text-slate-400 dark:text-slate-500 font-medium uppercase tracking-wider text-xs mb-3 mt-2">Traduce esta palabra</p>
                
                <!-- Contenedor para Modo Traducir -->
                <h3 id="practiceSpanishVerb" class="text-3xl md:text-5xl font-extrabold text-slate-800 dark:text-slate-100 mb-8 drop-shadow-sm">ESPERANDO...</h3>
                
                <!-- Contenedor para Modo Escuchar (Oculto por defecto) -->
                <div id="practiceListenContainer" class="hidden flex-col items-center mb-8">
                    <button onclick="playPracticeAudio()" class="h-16 w-16 sm:h-20 sm:w-20 rounded-full bg-cyan-50 dark:bg-cyan-950/40 text-cyan-600 dark:text-cyan-400 flex items-center justify-center hover:scale-105 active:scale-95 transition-all shadow-md focus:outline-none mb-3" title="Escuchar palabra">
                        <i class="fas fa-volume-up text-2xl sm:text-3xl"></i>
                    </button>
                    <span class="text-xs text-slate-400 dark:text-slate-500 font-medium">Presiona el parlante para volver a escuchar</span>
                </div>

                <!-- Layout de Inputs para Verbos -->
                <div id="verbPracticeInputs" class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6">
                    <div class="text-left">
                        <label class="block text-[10px] font-bold text-cyan-600 dark:text-cyan-400 uppercase tracking-wider mb-1 ml-1">Infinitivo</label>
                        <input type="text" id="input-base" class="practice-input w-full px-4 py-3 bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:border-cyan-500 dark:focus:border-cyan-400 font-bold text-slate-700 dark:text-slate-200" autocomplete="off">
                    </div>
                    <div class="text-left">
                        <label class="block text-[10px] font-bold text-blue-600 dark:text-blue-400 uppercase tracking-wider mb-1 ml-1">Pasado</label>
                        <input type="text" id="input-past" class="practice-input w-full px-4 py-3 bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:border-blue-500 dark:focus:border-blue-400 font-bold text-slate-700 dark:text-slate-200" autocomplete="off">
                    </div>
                    <div class="text-left">
                        <label class="block text-[10px] font-bold text-sky-600 dark:text-sky-400 uppercase tracking-wider mb-1 ml-1">Participio</label>
                        <input type="text" id="input-pastparticiple" class="practice-input w-full px-4 py-3 bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:border-sky-500 dark:focus:border-sky-400 font-bold text-slate-700 dark:text-slate-200" autocomplete="off">
                    </div>
                </div>

                <!-- Layout de Inputs para Sustantivos (Un solo campo) -->
                <div id="nounPracticeInputs" class="hidden mb-6 max-w-md mx-auto">
                    <div class="text-left">
                        <label class="block text-[10px] font-bold text-cyan-600 dark:text-cyan-400 uppercase tracking-wider mb-1 ml-1">Traducción al Inglés</label>
                        <input type="text" id="input-noun-english" class="practice-input w-full px-4 py-3 bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:border-cyan-500 dark:focus:border-cyan-400 font-bold text-slate-700 dark:text-slate-200 text-center text-lg placeholder-slate-400" placeholder="Escribe la traducción aquí" autocomplete="off">
                    </div>
                </div>

                <div id="feedbackMessage" class="min-h-10 flex flex-col items-center justify-center font-bold text-sm sm:text-base transition-all duration-300 opacity-0 scale-95 rounded-xl mb-6"></div>
                
                <div class="flex flex-col sm:flex-row justify-center items-center gap-3">
                    <button onclick="checkAnswers()" class="w-full sm:w-auto px-6 py-3 bg-gradient-to-r from-blue-600 to-cyan-600 text-white font-bold rounded-xl shadow-lg hover:shadow-xl hover:-translate-y-0.5 transition-all"><i class="fas fa-check-circle mr-2"></i> Comprobar</button>
                    <button onclick="showAnswer()" class="w-full sm:w-auto px-6 py-3 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-300 font-bold rounded-xl border-2 border-slate-200 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-700 transition-all"><i class="fas fa-eye mr-2"></i> Ver</button>
                    <button onclick="nextPracticeVerb()" class="w-full sm:w-auto px-6 py-3 bg-white dark:bg-slate-900 text-slate-600 dark:text-slate-300 font-bold rounded-xl border-2 border-slate-200 dark:border-slate-800 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-all">Saltar <i class="fas fa-arrow-right ml-2"></i></button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Contenedor flotante de notificaciones Toasts para no usar Alerts -->
<div id="toastContainer" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2 pointer-events-none max-w-sm w-full px-4"></div>

    function getLevenshteinDistance(a, b) {
        const matrix = [];
        for (let i = 0; i <= b.length; i++) matrix[i] = [i];
        for (let j = 0; j <= a.length; j++) matrix[0][j] = j;
        for (let i = 1; i <= b.length; i++) {
            for (let j = 1; j <= a.length; j++) {
                if (b.charAt(i - 1) === a.charAt(j - 1)) {
                    matrix[i][j] = matrix[i - 1][j - 1];
                } else {
                    matrix[i][j] = Math.min(
                        matrix[i - 1][j - 1] + 1,
                        matrix[i][j - 1] + 1,
                        matrix[i - 1][j] + 1
                    );
                }
            }
        }
        return matrix[b.length][a.length];
    }

    function isFuzzyMatch(spoken, target, tolerance) {
        if (spoken === target || spoken.includes(target) || target.includes(spoken)) return true;
        if (tolerance === 'strict') return false;

        const distance = getLevenshteinDistance(spoken, target);
        const len = target.length;

        if (tolerance === 'easy') {
            if (len <= 3) return distance <= 1; 
            if (len <= 5) return distance <= 2; 
            return distance <= 3; 
        } else { 
            if (len <= 4) return distance <= 1;
            return distance <= 2;
        }
    }

    function resetActiveMicButton() {
        if (micWatchdogTimer) {
            clearTimeout(micWatchdogTimer);
            micWatchdogTimer = null;
        }
        if (activeMicButton && originalButtonClass) {
            activeMicButton.className = originalButtonClass;
            activeMicButton.innerHTML = originalButtonHtml;
        }
        activeMicButton = null;
        activeRecognition = null;
    }

    function recordPronunciation(targetWord, btn, theme) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        if (!SpeechRecognition) {
            showToast("<i class='fas fa-exclamation-triangle'></i> Tu navegador no soporta el reconocimiento de voz. Usa Google Chrome.", "error");
            return;
        }

        if (synth.speaking) {
            synth.cancel();
            if (currentlySpeakingButton) {
                resetPlayButton(currentlySpeakingButton);
                currentlySpeakingButton = null;
            }
        }

        if (activeRecognition) {
            try { activeRecognition.abort(); } catch(e) {}
            resetActiveMicButton();
        }

        const rec = new SpeechRecognition();
        rec.lang = 'en-US';
        rec.interimResults = false;
        rec.maxAlternatives = 5;

        activeRecognition = rec;
        activeMicButton = btn;
        originalButtonClass = `h-6 w-6 rounded-full bg-${theme}-50 dark:bg-${theme}-950/40 text-${theme}-600 dark:text-${theme}-400 flex items-center justify-center hover:bg-${theme}-500 hover:text-white transition-all`;
        originalButtonHtml = '<i class="fas fa-microphone text-[10px]"></i>';

        let hasResult = false; 

        rec.onstart = () => {
            btn.className = "shrink-0 h-6 w-6 rounded-full bg-red-500 text-white flex items-center justify-center animate-pulse transition-all";
            btn.innerHTML = '<i class="fas fa-microphone-alt text-[10px]"></i>';
            showToast("<i class='fas fa-microphone'></i> Escuchando... Di: <b class='underline'>" + targetWord + "</b>", "info");

            micWatchdogTimer = setTimeout(() => {
                if (activeRecognition === rec) {
                    showToast("<i class='fas fa-microphone-slash'></i> Tiempo de espera de micrófono agotado.", "info");
                    try { rec.abort(); } catch(err) {}
                }
            }, 5000);
        };

        rec.onresult = (e) => {
            hasResult = true; 
            if (micWatchdogTimer) clearTimeout(micWatchdogTimer);
            
            try { rec.abort(); } catch(err) {}
            
            const tolerance = document.getElementById('toleranceSelect').value;
            const results = e.results[0];
            let isCorrect = false;
            let finalSpokenText = "";

            for (let i = 0; i < results.length; i++) {
                const spoken = results[i].transcript.toLowerCase().trim().replace(/[.,\/#!$%\^&\*;:{}=\-_`~()]/g,"");
                if (i === 0) finalSpokenText = spoken; 

                const cleanTarget = targetWord.toLowerCase().trim();
                const alternatives = cleanTarget.split(/[\/\-]/).map(s => s.trim().replace(/[.,\/#!$%\^&\*;:{}=\_`~()]/g,""));

                isCorrect = alternatives.some(alt => {
                    return isFuzzyMatch(spoken, alt, tolerance);
                });

                if (isCorrect) {
                    finalSpokenText = spoken; 
                    break;
                }
            }

            if (isCorrect) {
                btn.className = "shrink-0 h-6 w-6 rounded-full bg-emerald-500 text-white flex items-center justify-center transition-all scale-110";
                btn.innerHTML = '<i class="fas fa-check text-[10px]"></i>';
                showToast("<i class='fas fa-check-circle'></i> ¡Perfecto! Pronunciación correcta.", "success");
            } else {
                btn.className = "shrink-0 h-6 w-6 rounded-full bg-rose-500 text-white flex items-center justify-center transition-all scale-110";
                btn.innerHTML = '<i class="fas fa-times text-[10px]"></i>';
                showToast("<i class='fas fa-times-circle'></i> Entendí: \"" + finalSpokenText + "\". Intenta de nuevo.", "error");
            }
        };

        rec.onerror = (e) => {
            if (micWatchdogTimer) clearTimeout(micWatchdogTimer);
            if (hasResult) return; 
            
            if (activeRecognition === rec) {
                resetActiveMicButton();
                if (e.error === 'not-allowed') {
                    showToast("<i class='fas fa-lock'></i> Permiso de micrófono denegado.", "error");
                } else if (e.error !== 'aborted') {
                    showToast("<i class='fas fa-exclamation-circle'></i> No pude escucharte bien. Intenta de nuevo.", "error");
                }
            }
        };

        rec.onend = () => {
            if (micWatchdogTimer) clearTimeout(micWatchdogTimer);
            if (activeRecognition === rec) {
                setTimeout(() => {
                    if (activeRecognition === rec) {
                        resetActiveMicButton();
                    }
                }, 1200); 
            }
        };

        try {
            rec.start();
        } catch(err) {
            console.error(err);
            resetActiveMicButton();
        }
    }

    function resetPlayButton(btn) {
        if (!btn) return;
        btn.innerHTML = '<i class="fas fa-play text-xs sm:text-sm"></i>';
        btn.className = "h-10 w-10 sm:h-12 sm:w-12 rounded-full bg-blue-50 dark:bg-blue-950/50 text-blue-600 dark:text-blue-400 flex items-center justify-center hover:bg-blue-600 hover:text-white dark:hover:bg-blue-500 transition-all";
    }

    function playAudio(text, btn, onEndCallback) {
        if (btn && currentlySpeakingButton === btn && synth.speaking) {
            synth.cancel();
            resetPlayButton(btn);
            currentlySpeakingButton = null;
            return;
        }

        if (currentlySpeakingButton && currentlySpeakingButton !== btn) {
            resetPlayButton(currentlySpeakingButton);
        }

        if (synth.speaking) {
            synth.cancel();
        }

        currentlySpeakingButton = btn;
        
        if (btn) {
            btn.innerHTML = '<i class="fas fa-stop text-xs sm:text-sm"></i>';
            btn.className = "h-10 w-10 sm:h-12 sm:w-12 rounded-full bg-blue-600 text-white flex items-center justify-center transition-all scale-105 shadow-md";
        }

        const utterThis = new SpeechSynthesisUtterance(text);
        if (selectedVoice) utterThis.voice = selectedVoice;
        utterThis.rate = 0.8;
        utterThis.pitch = 1.1;

        utterThis.onend = () => {
            if (btn) resetPlayButton(btn);
            if (currentlySpeakingButton === btn) currentlySpeakingButton = null;
            if (onEndCallback) onEndCallback();
        };

        utterThis.onerror = () => {
            if (btn) resetPlayButton(btn);
            if (currentlySpeakingButton === btn) currentlySpeakingButton = null;
            if (onEndCallback) onEndCallback();
        };

        synth.speak(utterThis);
    }

    // --- MOTOR DE PRÁCTICA LOCAL CON SOPORTE DE GRUPOS DE 5 EN 5 ---
    let practicePool = [];
    let practiceIndex = 0;

    function initPracticePool() {
        let filtered = vocabData.filter(v => v.page === selectedPage);
        
        if (selectedRange !== 'all') {
            const [startIdx, endIdx] = selectedRange.split('-').map(Number);
            filtered = filtered.slice(startIdx, endIdx);
        }

        // Algoritmo Fisher-Yates Shuffled Deck
        for (let i = filtered.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [filtered[i], filtered[j]] = [filtered[j], filtered[i]];
        }

        practicePool = filtered;
        practiceIndex = 0;
    }

    function nextPracticeVerb() {
        answeredCorrectly = false;
        if (synth.speaking) synth.cancel();

        ['input-base', 'input-past', 'input-pastparticiple'].forEach(id => {
            const el = document.getElementById(id);
            if(el) {
                el.value = '';
                el.className = 'practice-input w-full px-4 py-3 bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:border-cyan-500 dark:focus:border-cyan-400 font-bold text-slate-700 dark:text-slate-200';
                el.disabled = false;
            }
        });

        const nounEl = document.getElementById('input-noun-english');
        if(nounEl) {
            nounEl.value = '';
            nounEl.className = 'practice-input w-full px-4 py-3 bg-slate-50 dark:bg-slate-950 border-2 border-slate-200 dark:border-slate-800 rounded-xl focus:outline-none focus:border-cyan-500 dark:focus:border-cyan-400 font-bold text-slate-700 dark:text-slate-200 text-center text-lg placeholder-slate-400';
            nounEl.disabled = false;
        }

        const feedback = document.getElementById('feedbackMessage');
        feedback.style.opacity = '0';
        feedback.innerHTML = '';

        if (practicePool.length === 0) {
            document.getElementById('practiceSpanishVerb').innerText = "SIN ELEMENTOS EN ESTE GRUPO";
            return;
        }

        if (practiceIndex >= practicePool.length) {
            const lastWord = practicePool[practicePool.length - 1];
            initPracticePool();
            if (practicePool.length > 1 && practicePool[0] === lastWord) {
                [practicePool[0], practicePool[1]] = [practicePool[1], practicePool[0]];
            }
        }

        // Actualizar barra de progreso (Ajustado para que inicie llena y llegue al 100%)
        const progressPercentage = ((practiceIndex + 1) / practicePool.length) * 100;
        document.getElementById('practiceProgressBar').style.width = `${progressPercentage}%`;
        document.getElementById('practiceCounterLabel').innerText = `${practiceIndex + 1}/${practicePool.length}`;

        currentPracticeVerb = practicePool[practiceIndex];
        
        const isNoun = currentPracticeVerb.type === 'noun';

        if (currentPracticeMode === 'translate') {
            document.getElementById('practiceInstruction').innerText = "Traduce esta palabra";
            document.getElementById('practiceSpanishVerb').innerText = currentPracticeVerb.spanish;
        } else {
            document.getElementById('practiceInstruction').innerText = "Escucha y escribe la palabra";
            document.getElementById('practiceSpanishVerb').innerText = "";
        }

        if (isNoun) {
            document.getElementById('verbPracticeInputs').classList.add('hidden');
            document.getElementById('nounPracticeInputs').classList.remove('hidden');
            setTimeout(() => nounEl.focus(), 100);
        } else {
            document.getElementById('verbPracticeInputs').classList.remove('hidden');
            document.getElementById('nounPracticeInputs').classList.add('hidden');
            setTimeout(() => document.getElementById('input-base').focus(), 100);
        }

        if (currentPracticeMode === 'listen') {
            setTimeout(() => { playPracticeAudio(); }, 300);
        }
    }

    // --- Función para generar Corrección Visual (Tachado en Rojo / Correcto en Verde) ---
    function getErrorHtml(userText, correctText) {
        return `
            <div class="mt-2 flex items-center justify-center gap-2 text-sm sm:text-base bg-rose-50 dark:bg-rose-950/30 px-4 py-2 rounded-xl border border-rose-100 dark:border-rose-900/50 shadow-inner">
                <span class="text-rose-500 line-through font-semibold">${userText || '___'}</span>
                <i class="fas fa-arrow-right text-slate-300 dark:text-slate-600 text-xs mx-1"></i>
                <span class="text-emerald-500 font-extrabold">${correctText}</span>
            </div>
        `;
    }

    function checkAnswers() {
        if (!currentPracticeVerb || answeredCorrectly) return;

        const feedback = document.getElementById('feedbackMessage');
        feedback.innerHTML = '';
        feedback.style.opacity = '1';

        const isNoun = currentPracticeVerb.type === 'noun';

        if (isNoun) {
            const valEnglish = document.getElementById('input-noun-english').value.trim().toLowerCase();
            const targetClean = currentPracticeVerb.english.toLowerCase().trim();
            
            const alternatives = targetClean.split(/[\/\-]/).map(s => s.trim());
            const isCorrect = alternatives.includes(valEnglish) || valEnglish === targetClean;

            const nounEl = document.getElementById('input-noun-english');
            nounEl.className = `practice-input w-full px-4 py-3 border-2 rounded-xl font-bold text-center text-lg ${isCorrect ? 'input-success' : 'input-error'}`;

            if (isCorrect) {
                answeredCorrectly = true;
                feedback.innerHTML = '<i class="fas fa-check text-green-500 mr-2"></i> ¡Correcto!';
                feedback.className = 'min-h-10 p-3 flex flex-col items-center justify-center font-bold text-sm sm:text-base bg-green-100 dark:bg-emerald-950/50 text-green-700 dark:text-green-300 rounded-xl mb-6';
                
                let hasTransitioned = false;
                const triggerTransition = () => {
                    if (!hasTransitioned) {
                        hasTransitioned = true;
                        practiceIndex++;
                        nextPracticeVerb();
                    }
                };
                const safetyTimeout = setTimeout(triggerTransition, 3500);

                playAudio(currentPracticeVerb.english, null, () => {
                    clearTimeout(safetyTimeout);
                    setTimeout(triggerTransition, 400); 
                });
            } else {
                feedback.className = 'min-h-10 p-3 flex flex-col items-center justify-center font-bold text-sm sm:text-base bg-red-100 dark:bg-rose-950/50 text-red-700 dark:text-red-300 rounded-xl mb-6';
                feedback.innerHTML = '<div><i class="fas fa-times text-red-500 mr-2"></i> Revisa la traducción:</div>';
                feedback.innerHTML += getErrorHtml(valEnglish, targetClean.split('/')[0].trim());
            }

        } else {
            const valBase = document.getElementById('input-base').value.trim().toLowerCase();
            const valPast = document.getElementById('input-past').value.trim().toLowerCase();
            const valPastPart = document.getElementById('input-pastparticiple').value.trim().toLowerCase();
            
            const isBaseCorrect = (valBase === currentPracticeVerb.base);
            const isPastCorrect = (currentPracticeVerb.past.split('/').map(s => s.trim()).includes(valPast) || valPast === currentPracticeVerb.past);
            const isPartCorrect = (valPastPart === currentPracticeVerb.pastParticiple);
            
            const isCorrect = isBaseCorrect && isPastCorrect && isPartCorrect;

            document.getElementById('input-base').className = `practice-input w-full px-4 py-3 border-2 rounded-xl font-bold ${isBaseCorrect ? 'input-success' : 'input-error'}`;
            document.getElementById('input-past').className = `practice-input w-full px-4 py-3 border-2 rounded-xl font-bold ${isPastCorrect ? 'input-success' : 'input-error'}`;
            document.getElementById('input-pastparticiple').className = `practice-input w-full px-4 py-3 border-2 rounded-xl font-bold ${isPartCorrect ? 'input-success' : 'input-error'}`;

            if (isCorrect) {
                answeredCorrectly = true;
                feedback.innerHTML = '<i class="fas fa-check text-green-500 mr-2"></i> ¡Correcto!';
                feedback.className = 'min-h-10 p-3 flex flex-col items-center justify-center font-bold text-sm sm:text-base bg-green-100 dark:bg-emerald-950/50 text-green-700 dark:text-green-300 rounded-xl mb-6';
                
                let hasTransitioned = false;
                const triggerTransition = () => {
                    if (!hasTransitioned) {
                        hasTransitioned = true;
                        practiceIndex++;
                        nextPracticeVerb();
                    }
                };
                const safetyTimeout = setTimeout(triggerTransition, 5500);

                playAudio(`${currentPracticeVerb.base}, ${currentPracticeVerb.past}, ${currentPracticeVerb.pastParticiple}`, null, () => {
                    clearTimeout(safetyTimeout);
                    setTimeout(triggerTransition, 400); 
                });
            } else {
                feedback.className = 'min-h-10 p-3 flex flex-col items-center justify-center font-bold text-sm sm:text-base bg-red-100 dark:bg-rose-950/50 text-red-700 dark:text-red-300 rounded-xl mb-6 w-full';
                feedback.innerHTML = '<div class="mb-1"><i class="fas fa-times text-red-500 mr-2"></i> Revisa los errores:</div>';
                
                let errorDetails = '<div class="flex flex-col gap-1 w-full max-w-sm">';
                if(!isBaseCorrect) errorDetails += getErrorHtml(valBase, currentPracticeVerb.base);
                if(!isPastCorrect) errorDetails += getErrorHtml(valPast, currentPracticeVerb.past.split('/')[0].trim());
                if(!isPartCorrect) errorDetails += getErrorHtml(valPastPart, currentPracticeVerb.pastParticiple);
                errorDetails += '</div>';
                
                feedback.innerHTML += errorDetails;
            }
        }
    }

    function showAnswer() {
        if (!currentPracticeVerb) return;
        
        if (currentPracticeVerb.type === 'noun') {
            document.getElementById('input-noun-english').value = currentPracticeVerb.english.split('/')[0].trim();
        } else {
            document.getElementById('input-base').value = currentPracticeVerb.base;
            document.getElementById('input-past').value = currentPracticeVerb.past.split('/')[0].trim();
            document.getElementById('input-pastparticiple').value = currentPracticeVerb.pastParticiple;
        }
    }
</script>
